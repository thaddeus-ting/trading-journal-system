# Trading Journal System - Configuration
# Copy to .env for secrets or use environment variables

# Vault path (READ-ONLY)
vault_path: "C:/Users/Thaddeus/OneDrive/Desktop/Vaulted"

# Data locations (editable via Settings page)
data_locations:
  data_dir: "data"
  daily_reports_dir: "daily_reports"
  pre_market_dir: "pre_market"
  weekly_reviews_dir: "weekly_reviews"
  monthly_reviews_dir: "monthly_reviews"

# Output directories (legacy - kept for backward compatibility)
data_dir: "C:/Users/Thaddeus/Claude Code Test/trading-journal-system/data"
daily_reports_dir: "daily_reports"
pre_market_dir: "pre_market"
weekly_reviews_dir: "weekly_reviews"
monthly_reviews_dir: "monthly_reviews"
cache_dir: "cache/llm"

# LLM Configuration
llm:
  provider: "groq"
  model: "openai/gpt-oss-120b"
  # API key from environment: GROQ_API_KEY, GOOGLE_API_KEY, OPENROUTER_API_KEY
  temperature: 0.1
  max_tokens: 4000
  timeout: 60
  max_retries: 3

# Financial Modeling Prep (FMP) - Economic Calendar & Earnings
fmp_api_key_env: "FMP_API_KEY"
earnings_min_market_cap: 50000000000  # $50B

# Economic Calendar
economic_calendar:
  # Major recurring events - add dates manually each quarter
  events_2026_q3:

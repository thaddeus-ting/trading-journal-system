# User-defined metrics to track (subprojects)
metrics:
  - name: "FOMO_frequency"
    description: "Number of FOMO entries per day"
    active: true
  - name: "early_exit_instances"
    description: "Early exits on single M5 candle fear"
    active: true
  - name: "VWAP_rejection_HPTE_winrate"
    description: "Win rate of VWAP rejection longs in HPTE"
    active: true
  - name: "market_condition_accuracy"
    description: "Accuracy of HPTE/LPTE bias call"
    active: true
  - name: "pullback_quality_score"
    description: "Wimpy vs strong pullback classification accuracy"
    active: true

# User-approved rules (activated from weekly review)
active_rules: []

# Prompt settings
prompts:
  daily_report: "config/prompts/daily_report.txt"
  pre_market: "config/prompts/pre_market.txt"
  weekly_patterns: "config/prompts/weekly_patterns.txt"

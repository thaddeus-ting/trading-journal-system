name: Pre-Market Report

on:
  schedule:
    # 8:30 PM ET = 00:30 UTC (next day, EDT) / 01:30 UTC (EST)
    - cron: '30 0 * * 2-6'
  workflow_dispatch:
    inputs:
      date:
        description: 'Date to process (YYYY-MM-DD) - generates pre-market for this date'
        required: false
        type: string

permissions:
  contents: write

jobs:
  pre-market-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pre-market generation
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.date }}" != "" ]; then
            TARGET_DATE="${{ github.event.inputs.date }}"
          else
            # Generate for NEXT trading day
            TARGET_DATE=$(TZ=America/New_York date -d "tomorrow" +%F)
            DOW=$(TZ=America/New_York date -d "$TARGET_DATE" +%u)
            # If Saturday (6) or Sunday (7), use Monday
            if [ "$DOW" -eq 6 ]; then
              TARGET_DATE=$(TZ=America/New_York date -d "$TARGET_DATE +2 days" +%F)
            elif [ "$DOW" -eq 7 ]; then
              TARGET_DATE=$(TZ=America/New_York date -d "$TARGET_DATE +1 day" +%F)
            fi
          fi
          echo "Generating Pre-Market for: $TARGET_DATE"
          python -m src.cli.daily_sync generate_pre_market --date "$TARGET_DATE"

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/pre_market/; then
            echo "No pre-market changes to commit"
            exit 0
          fi

          git add data/pre_market/
          git commit -m "chore: pre-market report for $TARGET_DATE"
          git push
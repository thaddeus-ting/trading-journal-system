name: Weekly Synthesis

on:
  schedule:
    # 10:00 AM ET = 14:00 UTC (summer) / 15:00 UTC (winter)
    # Runs every Sunday
    - cron: '0 14 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  weekly-synthesis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly synthesis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python scripts/weekly_synthesis.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Check if there are changes in data/
          if git diff --quiet data/; then
            echo "No changes to commit"
            exit 0
          fi

          git add data/
          WEEK=$(date -d "last monday" +%Y-W%V 2>/dev/null || date -v-1w +%Y-W%V)
          git commit -m "chore: weekly review for week $WEEK"
          git push
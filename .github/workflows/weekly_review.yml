name: Weekly Review

on:
  schedule:
    # 5:30 PM ET Friday = 21:30 UTC (EDT) / 22:30 UTC (EST)
    - cron: '30 21 * * 5'
  workflow_dispatch:
    inputs:
      week:
        description: 'Week label to process (e.g., W29)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  weekly-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run weekly synthesis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: |
          python scripts/weekly_synthesis.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet data/weekly_reviews/; then
            echo "No weekly review changes to commit"
            exit 0
          fi

          WEEK_LABEL=$(python -c "from datetime import date; d=date.today(); m=d-timedelta(days=d.weekday()); print(f'W{m.isocalendar()[1]:02d}')")
          git add data/weekly_reviews/
          git commit -m "chore: weekly review for $WEEK_LABEL"
          git push